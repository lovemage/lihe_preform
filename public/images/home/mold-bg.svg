  </defs>
  
  <!-- Base Background -->
  <rect width="1440" height="800" fill="url(#paint0_linear)"/>
  
  <!-- Grid -->
  <rect width="1440" height="800" fill="url(#grid)" clip-path="url(#grid-mask)"/>
  
  <!-- Geometric Tech Shapes -->
  <path d="M1200 100 L1300 200 L1200 300 L1100 200 Z" fill="none" stroke="#94A3B8" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M1150 150 L1250 250 M1250 150 L1150 250" stroke="#94A3B8" stroke-width="1" stroke-opacity="0.2"/>
  
  <circle cx="200" cy="600" r="150" fill="none" stroke="#94A3B8" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="200" cy="600" r="100" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.3"/>
  <circle cx="200" cy="600" r="50" fill="none" stroke="#94A3B8" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Subtle Curves -->
  <path d="M-200 800 C 200 800 400 400 800 400 C 1200 400 1400 0 1600 0" fill="none" stroke="#C9A961" stroke-width="2" stroke-opacity="0.1"/>
  <path d="M-200 850 C 200 850 450 450 800 450 C 1150 450 1400 50 1600 50" fill="none" stroke="#0F172A" stroke-width="1" stroke-opacity="0.05"/>
</svg>
