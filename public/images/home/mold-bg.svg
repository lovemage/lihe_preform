<svg width="100%" height="100%" viewBox="0 0 1440 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1440" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" />
      <stop offset="1" stop-color="#E2E8F0" />
    </linearGradient>
    <radialGradient id="paint1_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 200) rotate(90) scale(800 1000)">
      <stop stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.5" stroke-opacity="0.5"/>
    </pattern>
    <clipPath id="grid-mask">
      <rect width="1440" height="800" fill="url(#paint1_radial)"/>
